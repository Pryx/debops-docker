name: Build and push Docker image

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags and build args
        id: meta
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "tags=pryx/debops:$GITHUB_REF_NAME,pryx/debops:latest" >> $GITHUB_OUTPUT
            echo "debops_version=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          else
            echo "tags=pryx/debops:latest" >> $GITHUB_OUTPUT
            echo "debops_version=master" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: DEBOPS_VERSION=${{ steps.meta.outputs.debops_version }}
